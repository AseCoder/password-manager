<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./master.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Password Manager v2</title>
  </head>
  <body>

    <nav>

      <div class="greeting">
          
        <h1 id="hours" class="time">--</h1>
        
        <h1 id="splicer" class="time time-lighter">:</h1>
        
        <h1 id="mins" class="time">--</h1>

      </div>

      <div class="filter">

        <svg id="spyglass" height="30px" width="30px">

          <circle cx="20" cy="11" r="7.5" stroke="#777" stroke-width="2" fill="none" />

          <line x1="5" y1="25.5" x2="15" y2="15.5" stroke="#777" stroke-width="2"/>

        </svg>

        <input type="text" class="filter-input" placeholder="Filter">

      </div>

      <div class="scroll credlist-div">

        <ul class="credlist" id="credlist"></ul>

      </div>

    </nav>

    <div class="display">

      <h1 id="credentialName"></h1>

      <div class="credentialFields">

        <button>+</button>

        <button>-</button>

      </div>
      
    </div>

  </body>
  <script src="./app.js"></script>
</html>
